services:
  app:
    build:
      context: ./back_end_server
      dockerfile: dockerfile
    container_name: go_fiber_app
    env_file:
      - ./back_end_server/.env
    ports:
      - "3030:3030"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./back_end_server/.env:/root/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: mydb
      ENV: production
    restart: always

  frontend:
    build:
      context: ./front_end_client
      dockerfile: Dockerfile
    container_name: vite_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./front_end_client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - app
    restart: always
    command: npm run dev -- --host 0.0.0.0

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # http://localhost:5050 => pgadmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
